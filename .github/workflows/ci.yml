name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  tests:
    runs-on: ubuntu-latest
    needs: linter
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tasks_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install API dependencies
        run: |
          pip install -r api-service/requirements.txt
          
      - name: Run API Tests
        env:
          SECRET_KEY: "test_secret"
          DATABASE_URL: "postgres://user:password@localhost:5432/tasks_db"
        run: |
          cd api-service
          # Добавляем корень в PYTHONPATH, чтобы видеть common
          export PYTHONPATH=$PYTHONPATH:$(pwd)/../
          python manage.py test

      - name: Install Analytics dependencies
        run: |
          pip install -r analytics-service/requirements.txt

      - name: Run Analytics Tests
        run: |
          cd analytics-service
          export PYTHONPATH=$PYTHONPATH:$(pwd)/../
          python manage.py test

  build-check:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Build API Docker Image
        run: docker build -f docker/api.Dockerfile .
        
      - name: Build Analytics Docker Image
        run: docker build -f docker/analytics.Dockerfile .